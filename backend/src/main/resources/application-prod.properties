# PostgreSQL Database (Production)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fintrack}
spring.datasource.username=${DB_USERNAME:fintrack}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Server
server.port=${PORT:8080}

# CORS (same-origin in prod since backend serves frontend, but allow override)
app.cors.allowed-origins=${CORS_ORIGINS:*}

# Serve static resources (React build)
spring.web.resources.static-locations=classpath:/static/
