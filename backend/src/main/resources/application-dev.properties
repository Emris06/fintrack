# H2 Database (Development)
spring.datasource.url=jdbc:h2:mem:fintrack;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Let Hibernate auto-detect dialect
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
app.jwt.secret=dev-secret-key-fintrack-2024-must-be-at-least-256-bits-long-for-hs256
app.jwt.access-token-expiration=900000
app.jwt.refresh-token-expiration=604800000

# Server
server.port=8080

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,http://localhost:3000

# Logging
logging.level.com.fintrack=DEBUG
logging.level.org.springframework.security=DEBUG
